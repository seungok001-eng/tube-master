name: tube_master
description: "Tube Master - AI 유튜브 자동화 프로그램"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  
  # 상태 관리
  provider: 6.1.5+1
  
  # 로컬 저장소
  shared_preferences: 2.5.3
  hive: 2.2.3
  hive_flutter: 1.1.0
  
  # HTTP 통신
  http: 1.5.0
  
  # 파일 처리
  file_picker: ^8.0.0+1
  path_provider: ^2.1.4
  path: ^1.9.0
  
  # UI 컴포넌트
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.0
  
  # 유니크 ID 생성
  uuid: ^4.5.1
  
  # JSON 처리
  json_annotation: ^4.9.0
  
  # URL 열기 (오디오 재생용)
  url_launcher: ^6.3.1
  archive: ^4.0.9

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/
